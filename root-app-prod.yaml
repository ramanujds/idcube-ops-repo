apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-otrder-app-prod
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  source:
    path: environments/prod/apps
    repoURL: https://github.com/ramanujds/idcube-ops-repo.git
    targetRevision: HEAD
  sources: []
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true