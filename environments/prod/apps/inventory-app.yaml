apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-service-prod
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  sources:
    - path: inventory-app-chart
      repoURL: https://github.com/ramanujds/idcube-ops-repo.git
      targetRevision: HEAD
      helm:
        releaseName: inventory-service
        valueFiles:
          - $values/environments/prod/values/inventory-values.yaml
    - repoURL: https://github.com/ramanujds/idcube-ops-repo.git
      targetRevision: HEAD
      ref: values
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true